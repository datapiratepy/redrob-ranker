ai_usage_summary: |
  Used Claude (Cowork) as a pair-engineering assistant across all phases:
  EDA scripting, scoring-component drafting, investigation probes, and
  documentation. All design decisions (signal weights, template confidence
  values, penalty policies, hand labels) were reviewed and are owned by the
  team. No candidate data was sent to any hosted LLM; the ranking pipeline
  itself makes no model or API calls.

methodology_summary: |
  Interpretable feature-based ranker, no ML models at rank time. Recall:
  union of title regex, career-text evidence, and corroboration-gated skills
  (raw skill lists are the dataset's gamed surface). Scoring: career evidence
  40% (via an exhaustive 44-template classification table discovered in EDA —
  every stint description in the pool is one of 44 texts), title 20%,
  corroborated skills 20%, experience and location 10% each; multiplicative
  JD-rule penalties (consulting-only, short-stints, wrong-specialization) and
  a behavioral availability multiplier with JD-anchored thresholds. Honeypots
  are excluded by four career-math consistency checks (H1-H3, H6) that
  identify ~80 planted profiles. Reasoning is generated from verified profile
  facts only, with mechanical anti-hallucination checks. Validated against a
  25-candidate hand-labeled evaluation set. Full run: ~60s CPU-only.

